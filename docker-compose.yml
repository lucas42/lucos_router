services:
    router:
      build: .
      container_name: lucos_router
      ports: 
        - "80:80"
        - "443:443"
      environment:
        - ADMINEMAIL
        - HOSTDOMAIN
        - PRODUCTION
        - CERT_SERVER
        - SCHEDULE_TRACKER_ENDPOINT
      volumes:
        - "letsencrypt:/etc/letsencrypt"
        - "generatedconfig:/etc/nginx/conf.d/generated/"
      image: lucas42/lucos_router
      restart: always
      healthcheck:
        test: ["CMD", "curl", "--fail", "-s", "-o", "/dev/null", "http://127.0.0.1:80/"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 15s

volumes:
  generatedconfig:
  letsencrypt: